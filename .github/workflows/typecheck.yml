name: Typecheck

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - name: Build
        env:
          DATABASE_URL: postgres://user:pass@localhost:5432/db
          RUNPOD_API_KEY: dummy_runpod_key
          NEXT_PUBLIC_PRIVY_APP_ID: dummy_privy_app_id
        run: npm run build
